# Backward-compat shim — points to CircleInterpolationDataModule at alpha=0
# (pure noisy circle with 3 oversampled clusters, no bridge geometry)
defaults:
  - default

_target_: manylatents.data.circle_interpolation.CircleInterpolationDataModule
n_base: 1000
n_sectors: 3
oversample_factor: 5.0
cluster_arc_deg: 15.0
alpha: 0.0
circle_noise: 0.01
pop_noise: 0.05
bridge_threshold: 0.5
random_state: ${seed}
mode: full
shuffle_traindata: false
save_figure: true
save_dir: ${hydra:runtime.output_dir}
